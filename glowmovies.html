<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowmovies | Free Movies | Drug-store & GlowTV Private IPTV</title>
    <meta name="Glowmovies The Glow-Network" content="The best collection Movies, Releases, and GlowTV, IPTV Services, 24/7 ad free radio, and many more - content. Updated daily.">
<link rel="canonical" href="https://glowlinks.net/glowmovies" />

<link rel="alternate" href="https://glowlinks.net/glowmovies" hreflang="x-default" />
<link rel="alternate" href="https://glowtv.org/glowmovies" hreflang="en" />
<link rel="alternate" href="https://glowtv.shop/glowmovies" hreflang="en-US" />
    <link rel="icon" type="image/png" href="the-glow-network.png">

<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050509;
      color: #f5f5f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: linear-gradient(to bottom, #050509 60%, transparent);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .logo {
      font-weight: 800;
      letter-spacing: 0.08em;
      font-size: 20px;
      text-transform: uppercase;
      color: #ff3b6b;
      cursor: pointer;
    }
    .search-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      background: #11131a;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #262938;
    }
    .search-bar input {
      background: transparent;
      border: none;
      outline: none;
      color: #f5f5f5;
      width: 220px;
      font-size: 14px;
    }

    main {
      padding: 0 24px 40px;
    }

    /* Hero */
    .hero {
      position: relative;
      height: 55vh;
      min-height: 320px;
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 24px;
      background: radial-gradient(circle at top, #2b2f4a, #050509 60%);
      display: flex;
      align-items: flex-end;
      padding: 24px;
    }
    .hero-backdrop {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: brightness(0.45);
      transform: scale(1.05);
    }
    .hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(5,5,9,0.95), rgba(5,5,9,0.2));
    }
    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 60%;
    }
    .hero-title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .hero-meta {
      font-size: 13px;
      opacity: 0.8;
      margin-bottom: 10px;
    }
    .hero-overview {
      font-size: 14px;
      opacity: 0.9;
      max-height: 80px;
      overflow: hidden;
    }

    /* Rows */
    .row {
      margin-bottom: 22px;
    }
    .row-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .row-scroller {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: thin;
    }
    .row-scroller::-webkit-scrollbar {
      height: 6px;
    }
    .row-scroller::-webkit-scrollbar-thumb {
      background: #262938;
      border-radius: 999px;
    }

    .card {
      flex: 0 0 auto;
      width: 140px;
      cursor: pointer;
    }
    .card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      border-radius: 10px;
      background: #151722;
      background-size: cover;
      background-position: center;
      margin-bottom: 6px;
      position: relative;
      overflow: hidden;
    }
    .card-poster::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.55), transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .card:hover .card-poster::after {
      opacity: 1;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .card-meta {
      font-size: 11px;
      opacity: 0.7;
    }

::-webkit-scrollbar {
    width: 10px;
    height: 10px;
}

::-webkit-scrollbar-track {
    background: #0b0d14;
    border-radius: 10px;
}

::-webkit-scrollbar-thumb {
    background: #262938;
    border-radius: 10px;
    border: 2px solid #0b0d14;
}

::-webkit-scrollbar-thumb:hover {
    background: #ff3b6b;
}

/* FIREFOX SUPPORT */
* {
    scrollbar-width: thin;
    scrollbar-color: #262938 #0b0d14;
}

</style>

</head>
<body>

<header>
  <div class="logo" onclick="location.href='index.html'">GlowMovies</div>
  <div class="search-bar">
    <input id="searchInput" placeholder="Search..." onkeyup="searchMovies()">
  </div>
</header>

<main>

  <div id="hero" class="hero">
    <div class="hero-backdrop" id="heroBackdrop"></div>
    <div class="hero-gradient"></div>
    <div class="hero-content">
      <div class="hero-title" id="heroTitle"></div>
      <div class="hero-meta" id="heroMeta"></div>
      <div class="hero-overview" id="heroOverview"></div>
    </div>
  </div>

  <div class="row">
    <div class="row-title">Trending Movies</div>
    <div class="row-scroller" id="trendingMovies"></div>
  </div>

  <div class="row">
    <div class="row-title">Trending Series</div>
    <div class="row-scroller" id="trendingSeries"></div>
  </div>

<div class="row">
  <div class="row-title">Genres</div>
  <div id="genresContainer"></div>
</div>

<footer style="
    margin-top: 40px;
    padding: 30px 24px;
    text-align: center;
    font-size: 13px;
    opacity: 0.7;
    color: #f5f5f5;
    border-top: 1px solid #262938;
    background: linear-gradient(to top, #050509 70%, transparent);
">
    <div style="margin-bottom: 6px; font-weight: 700; letter-spacing: 0.06em; color:#ff3b6b;">
        GlowMovies © 2026
    </div>

    <div style="margin-bottom: 10px;">
        This platform does <b>not</b> store any data.
    </div>

    <a href="legal.html" style="color:#ff3b6b; font-weight:600; text-decoration:none; margin-right:15px;">
        DMCA Policy
    </a>

    <a href="about_glowmovies.html" style="color:#ff3b6b; font-weight:600; text-decoration:none;">
        About Us
    </a>
</footer>

</main>

<script>
const apiKey = "5378953b110dc4468b85ce936fbce1cc";

async function fetchTrending() {
    const movieRes = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${apiKey}`);
    const seriesRes = await fetch(`https://api.themoviedb.org/3/trending/tv/week?api_key=${apiKey}`);

    const movies = await movieRes.json();
    const series = await seriesRes.json();

    setHero(movies.results[0]);
    displayItems(movies.results, "trendingMovies", "movie");
    displayItems(series.results, "trendingSeries", "tv");
}

function setHero(item) {
    document.getElementById("heroBackdrop").style.backgroundImage =
      `url(https://image.tmdb.org/t/p/original${item.backdrop_path})`;

    document.getElementById("heroTitle").innerText = item.title || item.name;
    document.getElementById("heroMeta").innerText =
      (item.release_date || item.first_air_date || "").substring(0,4) +
      " • Rating " + item.vote_average.toFixed(1);

    document.getElementById("heroOverview").innerText = item.overview;
}

function displayItems(items, containerId, type) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    items.forEach(item => {
        if (!item.poster_path) return;

        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => location.href = `watch.html?id=${item.id}&type=${type}`;

        card.innerHTML = `
          <div class="card-poster" style="background-image:url('https://image.tmdb.org/t/p/w500${item.poster_path}')"></div>
          <div class="card-title">${item.title || item.name}</div>
          <div class="card-meta">${(item.release_date || item.first_air_date || "").substring(0,4)}</div>
        `;

        container.appendChild(card);
    });
}

fetchTrending();

loadGenres();

async function searchMovies() {
    const query = document.getElementById("searchInput").value.trim();

    if (query.length < 2) return;

    const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${apiKey}&query=${query}`);
    const data = await res.json();

    const container = document.getElementById("trendingMovies");
    container.innerHTML = "";

    data.results.forEach(item => {
        if (!item.poster_path) return;

        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => location.href = `watch.html?id=${item.id}&type=${item.media_type}`;

        card.innerHTML = `
          <div class="card-poster" style="background-image:url('https://image.tmdb.org/t/p/w500${item.poster_path}')"></div>
          <div class="card-title">${item.title || item.name}</div>
          <div class="card-meta">${(item.release_date || item.first_air_date || "").substring(0,4)}</div>
        `;

        container.appendChild(card);
    });
}

// Disable right-click
document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", e => {
    if (e.key === "F12") e.preventDefault();
    if (e.ctrlKey && e.shiftKey && ["I","C","J"].includes(e.key)) e.preventDefault();
    if (e.ctrlKey && ["U","S","H"].includes(e.key)) e.preventDefault();
});

document.addEventListener("dragstart", e => e.preventDefault());

let devtoolsOpen = false;

function detectDevTools() {
    const start = performance.now();
    debugger;
    const end = performance.now();
    const debugTime = end - start > 20; // 20ms = safer threshold

    const element = new Image();
    let consoleTriggered = false;
    element.__defineGetter__("id", function () {
        consoleTriggered = true;
    });
    console.log(element);

    if ((debugTime || consoleTriggered) && !devtoolsOpen) {
        devtoolsOpen = true;

        document.body.innerHTML = `
            <div style="
                font-family: system-ui;
                color: #ff3b6b;
                text-align: center;
                padding-top: 20vh;
                font-size: 24px;
            ">
                🔒 Glowflare Protection Enabled<br><br>
                Inspecting is disabled.
            </div>`;
    }
}

setInterval(detectDevTools, 800);

async function loadGenres() {
    const res = await fetch(`https://api.themoviedb.org/3/genre/movie/list?api_key=${apiKey}`);
    const data = await res.json();

    const container = document.getElementById("genresContainer");
    container.innerHTML = "";

    data.genres.forEach(g => {
        const row = document.createElement("div");
        row.className = "row";

        row.innerHTML = `
            <div class="row-title">${g.name}</div>
            <div class="row-scroller" id="genre-${g.id}"></div>
        `;

        container.appendChild(row);

        loadGenreMovies(g.id);
    });
}

async function loadGenreMovies(genreId) {
    const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${apiKey}&with_genres=${genreId}`);
    const data = await res.json();

    const container = document.getElementById(`genre-${genreId}`);
    container.innerHTML = "";

    data.results.forEach(item => {
        if (!item.poster_path) return;

        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => location.href = `watch.html?id=${item.id}&type=movie`;

        card.innerHTML = `
          <div class="card-poster" style="background-image:url('https://image.tmdb.org/t/p/w500${item.poster_path}')"></div>
          <div class="card-title">${item.title}</div>
          <div class="card-meta">${(item.release_date || "").substring(0,4)}</div>
        `;

        container.appendChild(card);
    });
}

</script>

</body>
</html>
