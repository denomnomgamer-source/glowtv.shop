<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nodes | Glowflare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="canonical" href="https://glowlinks.net/nodes" />

<link rel="alternate" href="https://glowlinks.net/nodes" hreflang="x-default" />
<link rel="alternate" href="https://glowtv.org/nodes" hreflang="en" />
<link rel="alternate" href="https://glowtv.shop/nodes" hreflang="en-US" />

<link rel="icon" type="image/png" href="the-glow-network.png">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        glowflare: { DEFAULT: '#F38020' },
                        darkbg: '#0F172A',
                        surface: '#1E293B'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-x-hidden pt-16">

    <nav class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="window.location.href='glowflare.html'">
                    <span class="font-extrabold text-2xl tracking-tight text-gray-900">Glow<span class="text-glowflare">flare</span></span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="infrastructure.html" class="text-gray-600 hover:text-glowflare font-medium">Infrastructure</a>
                    <a href="nodes.html" class="text-glowflare font-medium">Nodes</a>
                    <a href="tor.html" class="text-gray-600 hover:text-glowflare font-medium transition-colors">Tor/Darkweb</a>
                    <a href="docs.html" class="text-gray-600 hover:text-glowflare font-medium">Internal Docs</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="bg-darkbg text-white py-16 border-b border-gray-800 text-center">
        <h1 class="text-4xl font-extrabold mb-2">Global Node Topology</h1>
        <p class="text-gray-400">Live status of critical offshore infrastructure.</p>
    </header>

    <section class="py-12 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid md:grid-cols-3 gap-6">
            <!-- Node Card -->
            <div class="bg-white p-6 rounded-lg shadow border border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg">Moscow-Core-1</h3>
                    <span class="flex items-center text-xs font-bold text-green-500"><span class="h-2 w-2 rounded-full bg-green-500 animate-pulse mr-1"></span> ONLINE</span>
                </div>
                <p class="text-sm text-gray-500 mb-2">Region: RU-C</p>
                <div class="w-full bg-gray-200 rounded-full h-2.5"><div class="bg-glowflare h-2.5 rounded-full" style="width: 45%"></div></div>
                <p class="text-xs text-gray-400 mt-1 text-right">45% Capacity</p>
            </div>
            
            <!-- Node Card -->
            <div class="bg-white p-6 rounded-lg shadow border border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg">Zurich-Alpha</h3>
                    <span class="flex items-center text-xs font-bold text-green-500"><span class="h-2 w-2 rounded-full bg-green-500 animate-pulse mr-1"></span> ONLINE</span>
                </div>
                <p class="text-sm text-gray-500 mb-2">Region: CH-A</p>
                <div class="w-full bg-gray-200 rounded-full h-2.5"><div class="bg-glowflare h-2.5 rounded-full" style="width: 82%"></div></div>
                <p class="text-xs text-gray-400 mt-1 text-right">82% Capacity</p>
            </div>

            <!-- Node Card -->
            <div class="bg-white p-6 rounded-lg shadow border border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg">Chisinau-Edge</h3>
                    <span class="flex items-center text-xs font-bold text-green-500"><span class="h-2 w-2 rounded-full bg-green-500 animate-pulse mr-1"></span> ONLINE</span>
                </div>
                <p class="text-sm text-gray-500 mb-2">Region: MD-E</p>
                <div class="w-full bg-gray-200 rounded-full h-2.5"><div class="bg-glowflare h-2.5 rounded-full" style="width: 20%"></div></div>
                <p class="text-xs text-gray-400 mt-1 text-right">20% Capacity</p>
            </div>
        </div>
    </section>

<script>

document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", e => {
if (e.key === "F12") e.preventDefault();
if (e.ctrlKey && e.shiftKey && ["I","C","J"].includes(e.key)) e.preventDefault();
if (e.ctrlKey && ["U","S","H"].includes(e.key)) e.preventDefault();
});

document.addEventListener("dragstart", e => e.preventDefault());

let devtoolsOpen = false;

function detectDevTools() {
const threshold = 160;

const widthDiff = window.outerWidth - window.innerWidth > threshold;
const heightDiff = window.outerHeight - window.innerHeight > threshold;

const start = performance.now();
debugger;
const end = performance.now();
const debugTime = end - start > 5;

if ((widthDiff || heightDiff || debugTime) && !devtoolsOpen) {
devtoolsOpen = true;

document.body.innerHTML = `
<div style="
font-family: system-ui;
color: #ff3b6b;
text-align: center;
padding-top: 20vh;
font-size: 24px;
">
🔒 Glowflare Protection Enabled<br><br>
Inspecting is disabled.
</div>`;
}
}

setInterval(detectDevTools, 500);
</script>

</body>
</html>
